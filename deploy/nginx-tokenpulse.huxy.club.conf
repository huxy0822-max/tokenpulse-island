server {
    listen 80;
    listen [::]:80;
    server_name tokenpulse.huxy.club;

    root /var/www/tokenpulse.huxy.club;
    charset utf-8;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/tokenpulse.huxy.club;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 127.0.0.1:18443 ssl;
    server_name tokenpulse.huxy.club;

    root /var/www/tokenpulse.huxy.club;
    index index.html;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/tokenpulse.huxy.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tokenpulse.huxy.club/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/tokenpulse.huxy.club;
        default_type text/plain;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|json|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}

